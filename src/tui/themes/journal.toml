schema_version = 1

# Journal — the default theme. Layered dark/light surfaces, teal primary.
#
# Colors accept "cyan", "#rrggbb", "0".."255" (ANSI index), "none" (terminal
# default), a [palette] name, or { dark = <color>, light = <color> } picked by
# the terminal's background (see `color_mode` in config.toml).
# Style-valued keys also take { fg, bg, bold, dim, reversed, underlined }.
#
# Sections: [chrome] how the UI is drawn · [surfaces] background layers ·
# [text] ink · [accents] highlight hues · [status] feedback colors ·
# [borders] line style and colors · [interaction] selection/hover/cursor ·
# [scrollbar] colors and glyphs · [charts] insight graphs · [markdown] entry
# rendering · [toast] · [tabs]. Every key is optional, and each element's
# glyphs live in a [<section>.glyphs] table of its own.
#
# Borders take `style = "plain"|"rounded"|"double"|"thick"|"ascii"`, plus
# optional per-character overrides in [borders.glyphs] (top_left, top_right,
# bottom_left, bottom_right, horizontal, vertical), and the standalone
# focus_stripe and divider glyphs. `focused_style` and [borders.focused_glyphs]
# restyle focused panels (default: thick). See synthwave.toml and vaporwave.toml
# for examples.
#
# This file is yours to edit. Delete it to restore the bundled version on the
# next launch.

[chrome]
default_style = "flat"   # "flat" separates surfaces by background, "bordered" draws boxes
scrim = 0.45     # how much the screen dims behind dialogs (0 = classic dim)

[surfaces]
base    = { dark = "#0a0a0a", light = "#fcfcfc" }
content = { dark = "#141414", light = "#f3f3f3" }
dialog  = { dark = "#191919", light = "#eeeeee" }
element = { dark = "#1e1e1e", light = "#e9e9e9" }

[text]
body  = { dark = "#eeeeee", light = "#1c1c1c" }
muted = { dark = "#808080", light = "#8a8a8a" }

[accents]
primary = { dark = "#56b6b0", light = "#157d76" }

[status]
success = { dark = "#8fbf7f", light = "#3d7a37" }
warning = { dark = "#e0af68", light = "#a8660d" }
error   = { dark = "#e06c75", light = "#b03540" }
info    = { dark = "#7aa2f7", light = "#2f5fbf" }

[borders]
normal    = { dark = "#3c3c3c", light = "#d4d4d4" }
subtle    = { dark = "#282828", light = "#e4e4e4" }
focused   = { dark = "#56b6b0", light = "#157d76" }
unfocused = { dark = "#3c3c3c", light = "#d4d4d4" }

[interaction]
selection = { bg = { dark = "#56b6b0", light = "#157d76" }, fg = { dark = "#0a0a0a", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#303030", light = "#d8d8d8" } }
key_hint  = { fg = { dark = "#eeeeee", light = "#1c1c1c" }, bold = true }

[scrollbar]
track = { dark = "#282828", light = "#e4e4e4" }

[charts]
positive = { glyph = "▓", color = { dark = "#8fbf7f", light = "#3d7a37" } }
neutral  = { glyph = "▓", color = { dark = "#808080", light = "#8a8a8a" } }
negative = { glyph = "▓", color = { dark = "#e06c75", light = "#b03540" } }
bar      = { glyph = "▓", color = { dark = "#56b6b0", light = "#157d76" } }
track    = { glyph = "░", color = { dark = "#3c3c3c", light = "#d4d4d4" } }
baseline = { color = { dark = "#3c3c3c", light = "#d4d4d4" } }

[markdown]
heading    = { fg = { dark = "#56b6b0", light = "#157d76" }, bold = true }
link       = { fg = { dark = "#7aa2f7", light = "#2f5fbf" }, underlined = true }
code       = { dark = "#fab283", light = "#b05f14" }
blockquote = { fg = { dark = "#808080", light = "#8a8a8a" } }

# Fenced-code syntax highlighting; omitted categories render as plain code.
[markdown.syntax]
comment     = { dark = "#808080", light = "#8a8a8a" }
keyword     = { dark = "#fab283", light = "#b05f14" }
string      = { dark = "#8fbf7f", light = "#3d7a37" }
string_escape = { dark = "#e0af68", light = "#a8660d" }
number      = { dark = "#e0af68", light = "#a8660d" }
constant    = { dark = "#e0af68", light = "#a8660d" }
function    = { dark = "#56b6b0", light = "#157d76" }
type        = { dark = "#7aa2f7", light = "#2f5fbf" }
property    = { dark = "#7aa2f7", light = "#2f5fbf" }
punctuation = { dark = "#808080", light = "#8a8a8a" }
attribute   = { dark = "#e0af68", light = "#a8660d" }
tag         = { dark = "#56b6b0", light = "#157d76" }
label       = { dark = "#e06c75", light = "#b03540" }
error       = { dark = "#e06c75", light = "#b03540" }
