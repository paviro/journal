# Journal — the default theme. Layered dark/light surfaces, teal primary.
#
# Colors accept "cyan", "#rrggbb", "0".."255" (ANSI index), "none" (terminal
# default), a [palette] name, or { dark = <color>, light = <color> } picked by
# the terminal's background (see `color_mode` in config.toml).
# Style-valued keys also take { fg, bg, bold, dim, reversed, underlined }.
#
# Sections: [chrome] how the UI is drawn · [surfaces] background layers ·
# [text] ink · [accents] highlight hues · [status] feedback colors ·
# [borders] line style and colors · [interaction] selection/hover/cursor ·
# [scrollbar] colors and glyphs · [charts] insight graphs · [markdown] entry
# rendering · [metadata] the entry view's chip pills and environment strip ·
# [toast] · [tabs]. Every key is optional, and each element's glyphs live in
# a [<section>.glyphs] table of its own.
#
# [metadata.pills] takes `style = "reversed"|"bg"|"bracket"` plus one style
# per chip category (feelings, people, activities, tags); [metadata.glyphs]
# holds the environment strip's characters, with per-slug weather and moon
# tables ([metadata.glyphs.weather] / [metadata.glyphs.moon] — see
# wasteland.toml for an all-ASCII set).
#
# Borders take `style = "plain"|"rounded"|"double"|"thick"|"ascii"`, plus
# optional per-character overrides in [borders.glyphs] (top_left, top_right,
# bottom_left, bottom_right, horizontal, vertical), and the standalone
# focus_stripe and divider glyphs. `focused_style` and [borders.focused_glyphs]
# restyle focused panels (default: thick). See synthwave.toml and vaporwave.toml
# for examples.
#
# This file is yours to edit. Delete it to restore the bundled version on the
# next launch.

schema_version = 1

[chrome]
default_style = "flat"   # "flat" separates surfaces by background, "bordered" draws boxes
scrim = 0.45     # how much the screen dims behind dialogs (0 = classic dim)

[surfaces]
base    = { dark = "#0a0a0a", light = "#fcfcfc" }
content = { dark = "#141414", light = "#f3f3f3" }
dialog  = { dark = "#191919", light = "#eeeeee" }
element = { dark = "#1e1e1e", light = "#e9e9e9" }

[text]
body  = { dark = "#eeeeee", light = "#1c1c1c" }
muted = { dark = "#7c8494", light = "#828699" }

[accents]
primary   = { dark = "#56b6b0", light = "#157d76" }
secondary = { dark = "#f0855f", light = "#b0491f" }
tertiary  = { dark = "#b493ff", light = "#6b4fd6" }

[status]
success = { dark = "#7fd06a", light = "#357a2a" }
warning = { dark = "#f0b24f", light = "#9a5f00" }
error   = { dark = "#ff5c6a", light = "#c22f3c" }
info    = { dark = "#62a0ff", light = "#1f5fd0" }

[borders]
normal        = { dark = "#3c3c3c", light = "#d4d4d4" }
subtle        = { dark = "#282828", light = "#e4e4e4" }
focused       = { dark = "#56b6b0", light = "#157d76" }
unfocused     = { dark = "#3c3c3c", light = "#d4d4d4" }
divider = "tertiary"

[interaction]
selection = { bg = { dark = "#56b6b0", light = "#157d76" }, fg = { dark = "#0a0a0a", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#303030", light = "#d8d8d8" } }
key_hint  = { fg = { dark = "#eeeeee", light = "#1c1c1c" }, bold = true }

[scrollbar]
track = { dark = "#282828", light = "#e4e4e4" }

[charts]
positive = { glyph = "▓", color = { dark = "#7fd06a", light = "#357a2a" } }
neutral  = { glyph = "▓", color = { dark = "#7c8494", light = "#828699" } }
negative = { glyph = "▓", color = { dark = "#ff5c6a", light = "#c22f3c" } }
bar      = { glyph = "▓", color = { dark = "#3fd8cd", light = "#0f8078" } }
track    = { glyph = "░", color = { dark = "#3c3c3c", light = "#d4d4d4" } }
baseline = { color = { dark = "#3c3c3c", light = "#d4d4d4" } }

# One hue per element so entries read as structured, not flat: teal headings,
# warm-gold subheads, blue links, pink inline code, violet quotes.
[markdown]
heading    = { fg = { dark = "#33e1d1", light = "#0a8a80" }, bold = true }
heading3   = { fg = { dark = "#f5b13d", light = "#9a5f00" }, bold = true }
link       = { fg = { dark = "#4fa9ff", light = "#1f5fd0" }, underlined = true }
code       = { dark = "#ff77a8", light = "#c02356" }
blockquote = { fg = { dark = "#b493ff", light = "#6b4fd6" } }

# Fenced-code syntax highlighting; omitted categories render as plain code.
[markdown.syntax]
comment     = { dark = "#737b8c", light = "#828699" }
keyword     = { dark = "#d18bff", light = "#8a3fb8" }
string      = { dark = "#86d46f", light = "#357a2a" }
string_escape = { dark = "#f0b24f", light = "#9a5f00" }
number      = { dark = "#e6a25a", light = "#9a5f00" }
constant    = { dark = "#e6a25a", light = "#9a5f00" }
function    = { dark = "#33e1d1", light = "#0a8a80" }
type        = { dark = "#4fa9ff", light = "#1f5fd0" }
property    = { dark = "#8ab4ff", light = "#1f5fd0" }
punctuation = { dark = "#737b8c", light = "#828699" }
attribute   = { dark = "#f5b13d", light = "#9a5f00" }
tag         = { dark = "#ff77a8", light = "#c02356" }
label       = { dark = "#ff5c6a", light = "#c22f3c" }
error       = { dark = "#ff5c6a", light = "#c22f3c" }

[metadata.pills]
style      = "bg"
feelings   = { fg = { dark = "#b493ff", light = "#6b4fd6" }, bg = { dark = "#3c344f", light = "#d8d2ed" } }
people     = { fg = { dark = "#62a0ff", light = "#1f5fd0" }, bg = { dark = "#28374f", light = "#c9d5ec" } }
activities = { fg = { dark = "#7fd06a", light = "#357a2a" }, bg = { dark = "#2f432a", light = "#cddbcb" } }
tags       = { fg = { dark = "#56b6b0", light = "#157d76" }, bg = { dark = "#243c3b", light = "#c7dbda" } }

[tabs]
separator = "secondary"
