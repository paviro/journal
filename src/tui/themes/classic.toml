# Classic — the app's original look: terminal colors, drawn borders, reversed
# selection. Every value below matches the built-in fallback; omitted keys
# default to exactly these values.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "bordered"
scrim = 0.0        # 0 falls back to dimming (no color blend)

[surfaces]
base    = "none"   # terminal default
content = "none"
element = "none"

[text]
body  = {}         # terminal foreground; bold/dim come from the UI itself
muted = {}

[accents]
primary = "cyan"

[status]
success = "green"
warning = "yellow"
error   = "red"
info    = "blue"

[borders]
normal    = "244"
subtle    = "240"
focused   = {}
unfocused = {}

[interaction]
selection = { reversed = true }
key_hint  = { reversed = true, bold = true }

[charts]
positive = "green"
negative = "red"
bar      = "cyan"

[markdown]
heading    = {}
link       = { underlined = true }
code       = {}
blockquote = {}

# Bare-terminal metadata: the environment strip in plain ASCII, so the
# fallback (and e-ink screens) never depend on symbol coverage. Pills keep
# the default reversed cell — the classic look.
[metadata.glyphs]
separator = "*"
location  = "@"
sunrise   = "^"
sunset    = "v"
air       = "!"
pollen    = "%"
feelings  = "*"
activities = "+"

[metadata.glyphs.weather]
clear        = "o"
mostly_clear = "o"
partly_cloudy = "~"
cloudy       = "~"
fog          = "="
drizzle      = ","
rain         = ";"
snow         = "*"
thunderstorm = "z"

[metadata.glyphs.moon]
new             = "o"
waxing_crescent = ")"
first_quarter   = ")"
waxing_gibbous  = ")"
full            = "O"
waning_gibbous  = "("
last_quarter    = "("
waning_crescent = "("
