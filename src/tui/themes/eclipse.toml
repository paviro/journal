# Eclipse — pure black-and-white at maximum contrast. Meaning is carried by
# weight, glyph, and inversion, never by hue: chart series differ by fill glyph
# (█ ▒ ░), selection is a true ink/paper swap. Needs a true-color terminal; on
# a limited-palette display, prefer `classic`.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "bordered"
scrim = 0.0

[palette]
ink   = { dark = "#ffffff", light = "#000000" }
paper = { dark = "#000000", light = "#ffffff" }

[surfaces]
base    = "paper"
content = "paper"
dialog  = { dark = "#1a1a1a", light = "#f2f2f2" }
element = "paper"

[text]
body  = "ink"
muted = "ink"

[accents]
primary = "ink"

[status]
success = "ink"
warning = "ink"
error   = "ink"
info    = "ink"

[borders]
normal    = "ink"
subtle    = "ink"
focused   = "ink"
unfocused = "ink"

[interaction]
selection = { bg = "ink", fg = "paper", bold = true }
# No hover on eclipse: a gray lift would break the pure black-and-white contract.
hover     = { bg = "paper" }
key_hint  = { bg = "ink", fg = "paper", bold = true }

[charts]
positive = { glyph = "█", color = "ink" }
neutral  = { glyph = "▒", color = "ink" }
negative = { glyph = "░", color = "ink" }
bar      = { glyph = "▓", color = "ink" }
track    = { glyph = "░", color = "ink" }

[markdown]
heading    = { fg = "ink", bold = true }
link       = { fg = "ink", underlined = true }
code       = "ink"
blockquote = "ink"
