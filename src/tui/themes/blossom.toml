# Blossom — a cozy pink theme.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "flat"
scrim = 0.45

[surfaces]
base    = { dark = "#181014", light = "#fdf2f7" }
content = { dark = "#1d141c", light = "#f9e4ee" }
dialog  = { dark = "#281b26", light = "#f6dce9" }
element = { dark = "#2d1e2b", light = "#f3d3e3" }

[text]
body  = { dark = "#f4e3ec", light = "#3d1f30" }
muted = { dark = "#9c7f90", light = "#a06f88" }

[accents]
primary = { dark = "#f472b6", light = "#c22e79" }

[status]
success = { dark = "#86efac", light = "#15803d" }
warning = { dark = "#fcd34d", light = "#a16207" }
error   = { dark = "#fb7185", light = "#be123c" }
info    = { dark = "#93c5fd", light = "#1d4ed8" }

[borders]
normal    = { dark = "#43303e", light = "#ecc7da" }
subtle    = { dark = "#31232e", light = "#f4dbe8" }
focused   = { dark = "#f472b6", light = "#c22e79" }
unfocused = { dark = "#43303e", light = "#ecc7da" }

[interaction]
selection = { bg = { dark = "#f472b6", light = "#c22e79" }, fg = { dark = "#181014", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#443345", light = "#e7b8d2" } }
key_hint  = { fg = { dark = "#f4e3ec", light = "#3d1f30" }, bold = true }

[scrollbar]
track = { dark = "#31232e", light = "#f4dbe8" }

[charts]
positive = { glyph = "▓", color = { dark = "#86efac", light = "#15803d" } }
neutral  = { glyph = "▓", color = { dark = "#9c7f90", light = "#a06f88" } }
negative = { glyph = "▓", color = { dark = "#fb7185", light = "#be123c" } }
bar      = { glyph = "▓", color = { dark = "#f472b6", light = "#c22e79" } }
track    = { glyph = "░", color = { dark = "#43303e", light = "#ecc7da" } }
baseline = { color = { dark = "#43303e", light = "#ecc7da" } }

[markdown]
heading    = { fg = { dark = "#f472b6", light = "#c22e79" }, bold = true }
link       = { fg = { dark = "#93c5fd", light = "#1d4ed8" }, underlined = true }
code       = { dark = "#c084fc", light = "#7c3aed" }
blockquote = { fg = { dark = "#9c7f90", light = "#a06f88" } }

[markdown.syntax]
comment     = { dark = "#9c7f90", light = "#a06f88" }
keyword     = { dark = "#c084fc", light = "#7c3aed" }
string      = { dark = "#86efac", light = "#15803d" }
string_escape = { dark = "#fcd34d", light = "#a16207" }
number      = { dark = "#fcd34d", light = "#a16207" }
constant    = { dark = "#fcd34d", light = "#a16207" }
function    = { dark = "#f472b6", light = "#c22e79" }
type        = { dark = "#93c5fd", light = "#1d4ed8" }
property    = { dark = "#93c5fd", light = "#1d4ed8" }
punctuation = { dark = "#9c7f90", light = "#a06f88" }
attribute   = { dark = "#fcd34d", light = "#a16207" }
tag         = { dark = "#f472b6", light = "#c22e79" }
label       = { dark = "#fb7185", light = "#be123c" }
error       = { dark = "#fb7185", light = "#be123c" }
