# CRT — green phosphor on black glass, ASCII borders like a real dumb
# terminal. Single-hue like eclipse: meaning rides weight, glyph, and inversion
# (chart series differ by fill glyph). Light mode is a paper terminal.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "bordered"
scrim = 0.0

[palette]
phosphor = { dark = "#33ff66", light = "#175f2d" }
dim      = { dark = "#1d9944", light = "#4e8b62" }
glass    = { dark = "#020a04", light = "#eef7ee" }

[surfaces]
base    = "glass"
content = "glass"
dialog  = { dark = "#07160c", light = "#e0efe0" }
element = { dark = "#0b2112", light = "#d5e8d5" }

[text]
body  = "phosphor"
muted = "dim"

[accents]
primary = "phosphor"

[status]
success = "phosphor"
warning = "phosphor"
error   = "phosphor"
info    = "phosphor"

[borders]
style = "ascii"
normal    = "dim"
subtle    = "dim"
focused   = "phosphor"
unfocused = "dim"

[borders.glyphs]
divider = "╌"

[interaction]
selection = { bg = "phosphor", fg = "glass", bold = true }
hover     = { bg = { dark = "#0b2112", light = "#d5e8d5" } }
key_hint  = { bg = "phosphor", fg = "glass", bold = true }

[scrollbar]
track = "dim"

[scrollbar.glyphs]
thumb = "#"
track = "|"
up = "^"
down = "v"

[charts]
positive = { glyph = "█", color = "phosphor" }
neutral  = { glyph = "▒", color = "dim" }
negative = { glyph = "░", color = "phosphor" }
bar      = { glyph = "▓", color = "phosphor" }
track    = { glyph = "░", color = "dim" }
baseline = { color = "dim" }

[markdown]
heading    = { fg = "phosphor", bold = true }
link       = { fg = "phosphor", underlined = true }
code       = { fg = "phosphor", bold = true }
blockquote = "dim"

# Phosphor-safe metadata: bracketed chips and an ASCII environment strip.
[metadata.pills]
style = "bracket"

[metadata.glyphs]
separator = "*"
location  = "@"
sunrise   = "^"
sunset    = "v"
air       = "!"
pollen    = "%"
feelings  = "*"
activities = "+"

[metadata.glyphs.weather]
clear        = "o"
mostly_clear = "o"
partly_cloudy = "~"
cloudy       = "~"
fog          = "="
drizzle      = ","
rain         = ";"
snow         = "*"
thunderstorm = "z"

[metadata.glyphs.moon]
new             = "o"
waxing_crescent = ")"
first_quarter   = ")"
waxing_gibbous  = ")"
full            = "O"
waning_gibbous  = "("
last_quarter    = "("
waning_crescent = "("

[tabs.glyphs]
separator = "/"
