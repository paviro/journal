# Rosé Pine — Main (dark) / Dawn (light).
#
# See journal.toml for the accepted color/style forms.

[chrome]
default_style = "flat"
scrim = 0.45

[surfaces]
base    = { dark = "#191724", light = "#faf4ed" }
content = { dark = "#1f1d2e", light = "#f2e9e1" }
dialog  = { dark = "#232034", light = "#ede5dd" }
element = { dark = "#26233a", light = "#e8e0d8" }

[text]
body  = { dark = "#e0def4", light = "#575279" }
muted = { dark = "#908caa", light = "#797593" }

[accents]
primary = { dark = "#ebbcba", light = "#d7827e" }

[status]
success = { dark = "#9ccfd8", light = "#56949f" }
warning = { dark = "#f6c177", light = "#ea9d34" }
error   = { dark = "#eb6f92", light = "#b4637a" }
info    = { dark = "#3e8fb0", light = "#286983" }

[borders]
normal    = { dark = "#403d52", light = "#cbbdc4" }
subtle    = { dark = "#26233a", light = "#ece5dd" }
focused   = { dark = "#ebbcba", light = "#d7827e" }
unfocused = { dark = "#403d52", light = "#cbbdc4" }

[interaction]
selection = { bg = { dark = "#ebbcba", light = "#d7827e" }, fg = { dark = "#191724", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#524f67", light = "#cecacd" } }
key_hint  = { fg = { dark = "#e0def4", light = "#575279" }, bold = true }

[scrollbar]
track = { dark = "#26233a", light = "#ece5dd" }

[charts]
positive = { glyph = "▓", color = { dark = "#9ccfd8", light = "#56949f" } }
neutral  = { glyph = "▓", color = { dark = "#908caa", light = "#797593" } }
negative = { glyph = "▓", color = { dark = "#eb6f92", light = "#b4637a" } }
bar      = { glyph = "▓", color = { dark = "#ebbcba", light = "#d7827e" } }
track    = { glyph = "░", color = { dark = "#403d52", light = "#dfdad9" } }
baseline = { color = { dark = "#403d52", light = "#dfdad9" } }

[markdown]
heading    = { fg = { dark = "#ebbcba", light = "#d7827e" }, bold = true }
link       = { fg = { dark = "#3e8fb0", light = "#286983" }, underlined = true }
code       = { dark = "#c4a7e7", light = "#907aa9" }
blockquote = { fg = { dark = "#908caa", light = "#797593" } }

[markdown.syntax]
comment     = { dark = "#6e6a86", light = "#9893a5" }
keyword     = { dark = "#31748f", light = "#286983" }
string      = { dark = "#f6c177", light = "#ea9d34" }
string_escape = { dark = "#c4a7e7", light = "#907aa9" }
number      = { dark = "#c4a7e7", light = "#907aa9" }
constant    = { dark = "#c4a7e7", light = "#907aa9" }
function    = { dark = "#ebbcba", light = "#d7827e" }
type        = { dark = "#9ccfd8", light = "#56949f" }
property    = { dark = "#9ccfd8", light = "#56949f" }
punctuation = { dark = "#908caa", light = "#797593" }
attribute   = { dark = "#c4a7e7", light = "#907aa9" }
tag         = { dark = "#9ccfd8", light = "#56949f" }
label       = { dark = "#eb6f92", light = "#b4637a" }
error       = { dark = "#eb6f92", light = "#b4637a" }
