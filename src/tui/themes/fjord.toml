# Fjord — cool blues and frost greys.
#
# See journal.toml for the accepted color/style forms.

[chrome]
default = "flat"
scrim = 0.45

[colors]
bg      = { dark = "#101418", light = "#eceff4" }
panel   = { dark = "#161b22", light = "#e5e9f0" }
dialog  = { dark = "#1b2129", light = "#dfe4ed" }
element = { dark = "#1f2630", light = "#d8dee9" }

text  = { dark = "#d8dee9", light = "#2e3440" }
muted = { dark = "#7f8797", light = "#7a8394" }

primary   = { dark = "#88c0d0", light = "#3b6ea8" }
secondary = { dark = "#b48ead", light = "#7d5687" }

border          = { dark = "#2e3947", light = "#c2cad8" }
border_subtle   = { dark = "#222a35", light = "#d4dbe5" }
border_active   = { dark = "#4c566a", light = "#8b96ab" }
border_inactive = { dark = "#2e3947", light = "#c2cad8" }
scrollbar_track = { dark = "#222a35", light = "#d4dbe5" }

success = { dark = "#a3be8c", light = "#3f6f34" }
warning = { dark = "#ebcb8b", light = "#8f6a12" }
error   = { dark = "#bf616a", light = "#a33540" }
info    = { dark = "#81a1c1", light = "#2f5fbf" }

selection = { bg = { dark = "#88c0d0", light = "#3b6ea8" }, fg = { dark = "#101418", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#333e4f", light = "#bfc9da" } }
key_hint  = { fg = { dark = "#d8dee9", light = "#2e3440" }, bold = true }

[charts]
positive = { glyph = "▓", color = { dark = "#a3be8c", light = "#3f6f34" } }
neutral  = { glyph = "▓", color = { dark = "#7f8797", light = "#7a8394" } }
negative = { glyph = "▓", color = { dark = "#bf616a", light = "#a33540" } }
bar      = { glyph = "▓", color = { dark = "#88c0d0", light = "#3b6ea8" } }
track    = { glyph = "░", color = { dark = "#2e3947", light = "#c2cad8" } }
baseline = { dark = "#2e3947", light = "#c2cad8" }

[markdown]
heading    = { fg = { dark = "#88c0d0", light = "#3b6ea8" }, bold = true }
link       = { fg = { dark = "#81a1c1", light = "#2f5fbf" }, underlined = true }
code       = { dark = "#b48ead", light = "#7d5687" }
blockquote = { fg = { dark = "#7f8797", light = "#7a8394" } }

[markdown.syntax]
comment     = { dark = "#7f8797", light = "#7a8394" }
keyword     = { dark = "#81a1c1", light = "#2f5fbf" }
string      = { dark = "#a3be8c", light = "#3f6f34" }
string_escape = { dark = "#ebcb8b", light = "#8f6a12" }
number      = { dark = "#b48ead", light = "#7d5687" }
constant    = { dark = "#b48ead", light = "#7d5687" }
function    = { dark = "#88c0d0", light = "#3b6ea8" }
type        = { dark = "#8fbcbb", light = "#3b6ea8" }
property    = { dark = "#81a1c1", light = "#2f5fbf" }
punctuation = { dark = "#7f8797", light = "#7a8394" }
attribute   = { dark = "#ebcb8b", light = "#8f6a12" }
tag         = { dark = "#88c0d0", light = "#3b6ea8" }
label       = { dark = "#bf616a", light = "#a33540" }
error       = { dark = "#bf616a", light = "#a33540" }
