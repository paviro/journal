# Grove — deep forest greens with warm amber accents.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "flat"
scrim = 0.45

[surfaces]
base    = { dark = "#0e130e", light = "#f6faf4" }
content = { dark = "#101710", light = "#e9f1e5" }
dialog  = { dark = "#192319", light = "#e2eddd" }
element = { dark = "#1d281d", light = "#dbe8d4" }

[text]
body  = { dark = "#e3ecdd", light = "#22301f" }
muted = { dark = "#7f8f7a", light = "#79876f" }

[accents]
primary = { dark = "#7fb069", light = "#3e6b2f" }

[status]
success = { dark = "#8fbf7f", light = "#3d7a37" }
warning = { dark = "#d9ae61", light = "#8a6420" }
error   = { dark = "#d1666a", light = "#a63a3f" }
info    = { dark = "#7aa2c0", light = "#2f5f8f" }

[borders]
normal    = { dark = "#2b3a2b", light = "#c8d8bf" }
subtle    = { dark = "#202c20", light = "#d8e4d0" }
focused   = { dark = "#7fb069", light = "#3e6b2f" }
unfocused = { dark = "#2b3a2b", light = "#c8d8bf" }

[interaction]
selection = { bg = { dark = "#7fb069", light = "#3e6b2f" }, fg = { dark = "#0e130e", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#2f402f", light = "#c2d7b4" } }
key_hint  = { fg = { dark = "#e3ecdd", light = "#22301f" }, bold = true }

[scrollbar]
track = { dark = "#202c20", light = "#d8e4d0" }

[charts]
positive = { dark = "#8fbf7f", light = "#3d7a37" }
neutral  = { dark = "#7f8f7a", light = "#79876f" }
negative = { dark = "#d1666a", light = "#a63a3f" }
bar      = { dark = "#7fb069", light = "#3e6b2f" }
track    = { dark = "#2b3a2b", light = "#c8d8bf" }
baseline = { dark = "#2b3a2b", light = "#c8d8bf" }

[markdown]
heading    = { fg = { dark = "#7fb069", light = "#3e6b2f" }, bold = true }
link       = { fg = { dark = "#7aa2c0", light = "#2f5f8f" }, underlined = true }
code       = { dark = "#d9ae61", light = "#8a6420" }
blockquote = { fg = { dark = "#7f8f7a", light = "#79876f" } }

[markdown.syntax]
comment     = { dark = "#7f8f7a", light = "#79876f" }
keyword     = { dark = "#d9ae61", light = "#8a6420" }
string      = { dark = "#8fbf7f", light = "#3d7a37" }
string_escape = { dark = "#d9ae61", light = "#8a6420" }
number      = { dark = "#d9ae61", light = "#8a6420" }
constant    = { dark = "#d9ae61", light = "#8a6420" }
function    = { dark = "#7fb069", light = "#3e6b2f" }
type        = { dark = "#7aa2c0", light = "#2f5f8f" }
property    = { dark = "#7aa2c0", light = "#2f5f8f" }
punctuation = { dark = "#7f8f7a", light = "#79876f" }
attribute   = { dark = "#d9ae61", light = "#8a6420" }
tag         = { dark = "#7fb069", light = "#3e6b2f" }
label       = { dark = "#d1666a", light = "#a63a3f" }
error       = { dark = "#d1666a", light = "#a63a3f" }

[metadata.pills]
style      = "bg"
feelings   = { fg = { dark = "#7f8f7a", light = "#79876f" }, bg = { dark = "#2c352a", light = "#d3dccd" } }
people     = { fg = { dark = "#7aa2c0", light = "#2f5f8f" }, bg = { dark = "#2a3a3c", light = "#c4d4d4" } }
activities = { fg = { dark = "#8fbf7f", light = "#3d7a37" }, bg = { dark = "#30412c", light = "#c7d9c2" } }
tags       = { fg = { dark = "#7fb069", light = "#3e6b2f" }, bg = { dark = "#2c3d26", light = "#c7d6c1" } }
