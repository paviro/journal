# Tron — inside the Grid: electric-cyan light-cycle trails on black glass, with
# a program-orange antagonist accent. Flat chrome, cold blue-black surfaces.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "flat"
scrim = 0.55

[surfaces]
base    = { dark = "#05080d", light = "#eef3f8" }
content = { dark = "#0a1017", light = "#e2eaf2" }
dialog  = { dark = "#0f1620", light = "#d6e0ec" }
element = { dark = "#141d29", light = "#cad8e6" }

[text]
body  = { dark = "#cfe9ff", light = "#14222e" }
muted = { dark = "#5f7488", light = "#5a6b7a" }

[accents]
primary   = { dark = "#00e0ff", light = "#0077a0" }
secondary = { dark = "#ff8a1e", light = "#a85400" }
tertiary  = { dark = "#aef2ff", light = "#2f7d90" }

[status]
success = { dark = "#3ddc84", light = "#2e7d4e" }
warning = { dark = "#ff8a1e", light = "#a85400" }
error   = { dark = "#ff3b30", light = "#b3271e" }
info    = { dark = "#00e0ff", light = "#0077a0" }

[borders]
normal        = { dark = "#1c3a4a", light = "#b8cad8" }
subtle        = { dark = "#10222c", light = "#d0dce6" }
focused       = { dark = "#00e0ff", light = "#0077a0" }
unfocused     = { dark = "#1c3a4a", light = "#b8cad8" }
divider = "secondary"

[interaction]
selection = { bg = { dark = "#00e0ff", light = "#0077a0" }, fg = { dark = "#05080d", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#12222e", light = "#d2dded" } }
key_hint  = { fg = { dark = "#ff8a1e", light = "#a85400" }, bold = true }

[scrollbar]
thumb = { dark = "#00e0ff", light = "#0077a0" }
track = { dark = "#10222c", light = "#d0dce6" }

[charts]
positive = { dark = "#3ddc84", light = "#2e7d4e" }
neutral  = { dark = "#5f7488", light = "#5a6b7a" }
negative = { dark = "#ff3b30", light = "#b3271e" }
bar      = { dark = "#00e0ff", light = "#0077a0" }
track    = { dark = "#1c3a4a", light = "#b8cad8" }
baseline = { dark = "#1c3a4a", light = "#b8cad8" }

[markdown]
heading    = { fg = { dark = "#00e0ff", light = "#0077a0" }, bold = true }
link       = { fg = { dark = "#00e0ff", light = "#0077a0" }, underlined = true }
code       = { dark = "#ff8a1e", light = "#a85400" }
blockquote = { fg = { dark = "#5f7488", light = "#5a6b7a" } }

[markdown.syntax]
comment     = { dark = "#5f7488", light = "#5a6b7a" }
keyword     = { dark = "#ff8a1e", light = "#a85400" }
string      = { dark = "#3ddc84", light = "#2e7d4e" }
string_escape = { dark = "#aef2ff", light = "#2f7d90" }
number      = { dark = "#aef2ff", light = "#2f7d90" }
constant    = { dark = "#aef2ff", light = "#2f7d90" }
function    = { dark = "#00e0ff", light = "#0077a0" }
type        = { dark = "#aef2ff", light = "#2f7d90" }
property    = { dark = "#00e0ff", light = "#0077a0" }
punctuation = { dark = "#5f7488", light = "#5a6b7a" }
attribute   = { dark = "#ff8a1e", light = "#a85400" }
tag         = { dark = "#00e0ff", light = "#0077a0" }
label       = { dark = "#ff8a1e", light = "#a85400" }
error       = { dark = "#ff3b30", light = "#b3271e" }

[metadata.pills]
style      = "bg"
feelings   = { fg = { dark = "#aef2ff", light = "#2f7d90" }, bg = { dark = "#334851", light = "#bed4de" } }
people     = { fg = { dark = "#00e0ff", light = "#0077a0" }, bg = { dark = "#084451", light = "#b5d3e2" } }
activities = { fg = { dark = "#3ddc84", light = "#2e7d4e" }, bg = { dark = "#174332", light = "#bed4d1" } }
tags       = { fg = { dark = "#00e0ff", light = "#0077a0" }, bg = { dark = "#084451", light = "#b5d3e2" } }
