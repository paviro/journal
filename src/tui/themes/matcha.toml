# Matcha — a warm paper theme with a soft green accent.
#
# See journal.toml for the accepted color/style forms.

schema_version = 1

[chrome]
default_style = "flat"
scrim = 0.45

[surfaces]
base    = { dark = "#282828", light = "#fbf1c7" }
content = { dark = "#2d2a29", light = "#f2e5bc" }
dialog  = { dark = "#373433", light = "#efe0b7" }
element = { dark = "#3c3836", light = "#ebdbb2" }

[text]
body  = { dark = "#ebdbb2", light = "#3c3836" }
muted = { dark = "#928374", light = "#7c6f64" }

[accents]
primary = { dark = "#8ec07c", light = "#427b58" }

[status]
success = { dark = "#b8bb26", light = "#79740e" }
warning = { dark = "#fabd2f", light = "#b57614" }
error   = { dark = "#fb4934", light = "#9d0006" }
info    = { dark = "#83a598", light = "#076678" }

[borders]
normal    = { dark = "#504945", light = "#d5c4a1" }
subtle    = { dark = "#3c3836", light = "#ebdbb2" }
focused   = { dark = "#8ec07c", light = "#427b58" }
unfocused = { dark = "#504945", light = "#d5c4a1" }

[interaction]
selection = { bg = { dark = "#8ec07c", light = "#427b58" }, fg = { dark = "#282828", light = "#ffffff" }, bold = true }
hover     = { bg = { dark = "#665c54", light = "#c9b791" } }
key_hint  = { fg = { dark = "#ebdbb2", light = "#3c3836" }, bold = true }

[scrollbar]
track = { dark = "#3c3836", light = "#ebdbb2" }

[charts]
positive = { dark = "#b8bb26", light = "#79740e" }
neutral  = { dark = "#928374", light = "#7c6f64" }
negative = { dark = "#fb4934", light = "#9d0006" }
bar      = { dark = "#8ec07c", light = "#427b58" }
track    = { dark = "#504945", light = "#d5c4a1" }
baseline = { dark = "#504945", light = "#d5c4a1" }

[markdown]
heading    = { fg = { dark = "#8ec07c", light = "#427b58" }, bold = true }
link       = { fg = { dark = "#83a598", light = "#076678" }, underlined = true }
code       = { dark = "#fe8019", light = "#af3a03" }
blockquote = { fg = { dark = "#928374", light = "#7c6f64" } }

[markdown.syntax]
comment     = { dark = "#928374", light = "#7c6f64" }
keyword     = { dark = "#fe8019", light = "#af3a03" }
string      = { dark = "#b8bb26", light = "#79740e" }
string_escape = { dark = "#fabd2f", light = "#b57614" }
number      = { dark = "#d3869b", light = "#8f3f71" }
constant    = { dark = "#d3869b", light = "#8f3f71" }
function    = { dark = "#8ec07c", light = "#427b58" }
type        = { dark = "#fabd2f", light = "#b57614" }
property    = { dark = "#83a598", light = "#076678" }
punctuation = { dark = "#928374", light = "#7c6f64" }
attribute   = { dark = "#fabd2f", light = "#b57614" }
tag         = { dark = "#8ec07c", light = "#427b58" }
label       = { dark = "#fb4934", light = "#9d0006" }
error       = { dark = "#fb4934", light = "#9d0006" }

[metadata.pills]
style      = "bg"
feelings   = { fg = { dark = "#928374", light = "#7c6f64" }, bg = { dark = "#46403c", light = "#dacdaa" } }
people     = { fg = { dark = "#83a598", light = "#076678" }, bg = { dark = "#424945", light = "#c3ccae" } }
activities = { fg = { dark = "#b8bb26", light = "#79740e" }, bg = { dark = "#504e28", light = "#dace99" } }
tags       = { fg = { dark = "#8ec07c", light = "#427b58" }, bg = { dark = "#45503e", light = "#cfd0a8" } }
