# cargo-about configuration for the third-party license report embedded in the
# binary and shown by `notema licenses`.

accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "EUPL-1.2",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "ODbL-1.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

ignore-build-dependencies = true
ignore-dev-dependencies = true
