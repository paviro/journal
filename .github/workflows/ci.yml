name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  NOTEMA_SKIP_LICENSE_GENERATION: "1"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
      - run: sudo apt-get update && sudo apt-get install --yes libfuse3-dev pkg-config
      - run: cargo fmt --all --check
      - run: cargo check --workspace --all-targets --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo doc --workspace --no-deps --locked
      - run: cargo install cargo-audit --version 0.22.1 --locked
      - run: cargo audit --deny warnings --ignore RUSTSEC-2026-0173

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - run: brew install fuse-t pkg-config
      - run: PKG_CONFIG_PATH="$(brew --prefix fuse-t)/lib/pkgconfig" cargo check --workspace --all-targets --locked

  android-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          targets: aarch64-linux-android
      - name: Configure Android NDK compiler
        run: |
          TOOLCHAIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
      - run: cargo check -p notema --target aarch64-linux-android --locked
