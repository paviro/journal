name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  NOTEMA_SKIP_LICENSE_GENERATION: "1"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # Repo-wide gates, run once on Linux.
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all --check

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - run: cargo install cargo-audit --version 0.22.1 --locked
      # Acknowledged advisories live in .cargo/audit.toml (see docs/AUDIT.md), so
      # the same `cargo audit` a developer runs locally reproduces this result.
      - run: cargo audit --deny warnings

  # Per-platform build jobs. Linux is the primary one and also lints, tests, and
  # builds docs; the rest are compile checks for the platforms we ship.
  linux:
    name: Linux (lint · test · docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy
      - run: sudo apt-get update && sudo apt-get install --yes libfuse3-dev pkg-config
      - run: cargo check --workspace --all-targets --locked
      - if: ${{ !cancelled() }}
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # The fuse feature is cfg-gated out of the default build; check it compiles
      # so the mount wiring can't rot unnoticed.
      - if: ${{ !cancelled() }}
        run: cargo clippy -p notema --features fuse --locked -- -D warnings
      - if: ${{ !cancelled() }}
        run: cargo test --workspace --locked
      - if: ${{ !cancelled() }}
        run: cargo doc --workspace --no-deps --locked

  macos:
    name: macOS (check)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - run: brew install pkg-config
      - run: brew install --cask fuse-t
      - run: cargo check --workspace --all-targets --locked

  windows:
    name: Windows (check)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      # FUSE doesn't exist on Windows (notema-fuse needs libfuse) and the Windows
      # release build excludes it; check the rest of the standard build compiles.
      - run: cargo check --workspace --exclude notema-fuse --all-targets --locked

  android:
    name: Android (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          targets: aarch64-linux-android
      - name: Configure Android NDK compiler
        run: |
          TOOLCHAIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
      - run: cargo check -p notema --target aarch64-linux-android --locked
