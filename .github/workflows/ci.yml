name: CI

on:
  push:
    branches: [main]
  pull_request:

# The workflow only reads the repo; make that explicit rather than relying on
# the repo-level default staying read-only.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new push to a PR) to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NOTEMA_SKIP_LICENSE_GENERATION: "1"
  RUSTDOCFLAGS: "-D warnings"
  # Tolerate transient crates.io/CDN resets (curl [56]) on hosted runners.
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # Repo-wide gates, run once on Linux.
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all --check

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - run: cargo install cargo-audit --version 0.22.1 --locked
      # Acknowledged advisories live in .cargo/audit.toml (see docs/AUDIT.md), so
      # the same `cargo audit` a developer runs locally reproduces this result.
      - run: cargo audit --deny warnings

  # Per-platform build jobs. Linux is the primary one and also lints, tests, and
  # builds docs; the rest are compile checks for the platforms we ship.
  linux:
    name: Linux (lint · test · docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: clippy
      - run: sudo apt-get update && sudo apt-get install --yes libfuse3-dev pkg-config
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --workspace --all-targets --locked
      - if: ${{ !cancelled() }}
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # The fuse feature is cfg-gated out of the default build; check it compiles
      # so the mount wiring can't rot unnoticed.
      - if: ${{ !cancelled() }}
        run: cargo clippy -p notema --features fuse --locked -- -D warnings
      - if: ${{ !cancelled() }}
        run: cargo test --workspace --locked
      - if: ${{ !cancelled() }}
        run: cargo doc --workspace --no-deps --locked

  macos:
    name: macOS (check)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - run: brew install pkg-config
      - run: brew install --cask fuse-t
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --workspace --all-targets --locked

  # Both shipped Windows targets (x86_64 and aarch64 MSVC) check natively on
  # their own runner, where the host triple is the release target.
  windows:
    name: Windows (check, ${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # FUSE doesn't exist on Windows (notema-fuse needs libfuse) and the Windows
      # release build excludes it; check the rest of the standard build compiles.
      - run: cargo check --workspace --exclude notema-fuse --all-targets --locked

  # Cross-check the other targets we ship (see Makefile.toml) so the code keeps
  # compiling for the dimensions the native jobs miss: musl libc, 32-bit pointer
  # width (i686, armv7), 64-bit ARM — plus FreeBSD, which we don't ship but keep
  # compilable. Windows needs no row here — both MSVC release targets are
  # checked natively by the windows job above. `cargo check` still runs ring's
  # build script, so each target needs its cross C compiler (CC_<target>).
  # notema-fuse needs libfuse and is excluded, matching the release build. i586
  # is omitted on purpose: its bespoke SSE-free OpenSSL build is too heavy for
  # per-PR CI; the release workflow builds it.
  cross-check:
    name: Cross-check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            packages: musl-tools
            cc_var: CC_x86_64_unknown_linux_musl
            cc: musl-gcc
          - target: i686-unknown-linux-gnu
            packages: gcc-multilib
            cc_var: CC_i686_unknown_linux_gnu
            cc: gcc -m32
          - target: armv7-unknown-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf
            cc_var: CC_armv7_unknown_linux_gnueabihf
            cc: arm-linux-gnueabihf-gcc
          - target: aarch64-unknown-linux-gnu
            packages: gcc-aarch64-linux-gnu
            cc_var: CC_aarch64_unknown_linux_gnu
            cc: aarch64-linux-gnu-gcc
          # FreeBSD is check-only: the row guards that the workspace keeps
          # compiling for a Tier 2 BSD, not that we ship it. clang cross-compiles
          # the C deps' build-script objects with --target, but their sources
          # take OS-specific include paths (tree-sitter wants sys/endian.h),
          # which glibc's headers can't satisfy — so a step below extracts
          # usr/include from the pinned FreeBSD release into a sysroot. Nothing
          # links in a check, so headers are all it needs.
          - target: x86_64-unknown-freebsd
            packages: clang
            cc_var: CC_x86_64_unknown_freebsd
            cc: clang
            freebsd_sysroot: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install --yes ${{ matrix.packages }}
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      # The FreeBSD headers change rarely and the base set is a ~160 MB
      # download, so cache the extracted include dir keyed on the release.
      - if: ${{ matrix.freebsd_sysroot }}
        id: freebsd-sysroot
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/freebsd-sysroot
          key: freebsd-sysroot-14.4-RELEASE
      - if: ${{ matrix.freebsd_sysroot && steps.freebsd-sysroot.outputs.cache-hit != 'true' }}
        name: Download FreeBSD headers
        run: |
          curl --fail --location --output /tmp/base.txz \
              https://download.freebsd.org/releases/amd64/amd64/14.4-RELEASE/base.txz
          echo "769f60a6eea2938ad6b7943cfbcc17dfaf7d1f7ba59a32b869a00349302df853  /tmp/base.txz" | sha256sum --check
          mkdir -p "$HOME/freebsd-sysroot"
          tar -C "$HOME/freebsd-sysroot" -xf /tmp/base.txz ./usr/include
      - if: ${{ matrix.freebsd_sysroot }}
        run: echo "CFLAGS_x86_64_unknown_freebsd=--sysroot=$HOME/freebsd-sysroot" >> "$GITHUB_ENV"
      # ring's build script compiles native code, so point cc at the target's
      # cross compiler (CC_<target>, with dashes as underscores).
      - run: echo "${{ matrix.cc_var }}=${{ matrix.cc }}" >> "$GITHUB_ENV"
      - run: cargo check --target ${{ matrix.target }} --workspace --exclude notema-fuse --all-targets --locked

  android:
    name: Android (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: aarch64-linux-android
      - name: Configure Android NDK compiler
        run: |
          TOOLCHAIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check -p notema --target aarch64-linux-android --locked
