name: Release

# Build every shipped artifact and publish it to the GitHub Release for a pushed
# version tag. See docs/RELEASING.md.
on:
  push:
    # Glob (not regex): matches date-based versions like 2026.7.4 — a digit-led
    # number in each of three dot-separated segments.
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  # Manual runs can build one target group or the complete artifact set, but
  # always skip publishing (see the publish job's `if`).
  workflow_dispatch:
    inputs:
      target_group:
        description: Target group to build
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - linux-fuse
          - i586
          - android
          - windows
          - macos
          - macos-fuse

# Least privilege by default: only the publish job opts up to contents: write.
permissions:
  contents: read

# Cancel superseded manual rehearsals on the same ref, but isolate them from tag
# pushes and never cancel a run that may be publishing.
concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

env:
  CARGO_TERM_COLOR: always
  # Retry transient registry failures and avoid HTTP/2 framing errors.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # Fail a mistagged release in seconds, before the build runners spin up. The job
  # itself always runs (a skipped job would cascade-skip everything that
  # `needs` it on workflow_dispatch); the check only applies to tag pushes.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: github.event_name == 'push'
        with:
          persist-credentials: false
      - name: Validate release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $GITHUB_REF_NAME is not a YEAR.MONTH.PATCH version" >&2
            exit 1
          fi
          version="$(sed -n '/^\[workspace\.package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' Cargo.toml)"
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match workspace.package.version $version" >&2
            exit 1
          fi
  # Standard GNU artifacts retain a glibc 2.17 floor. FUSE, i586, and Android
  # are handled separately.
  linux:
    name: Linux ${{ matrix.platform }}
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'linux'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux-gnu-x86_64
            runner: ubuntu-latest
            zigbuild: true
          - target: x86_64-unknown-linux-musl
            platform: linux-musl-x86_64
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            platform: linux-gnu-aarch64
            runner: ubuntu-latest
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            platform: linux-musl-aarch64
            runner: ubuntu-24.04-arm
          - target: i686-unknown-linux-gnu
            platform: linux-gnu-i686
            runner: ubuntu-latest
            zigbuild: true
          - target: i686-unknown-linux-musl
            platform: linux-musl-i686
            runner: ubuntu-latest
          - target: armv7-unknown-linux-gnueabihf
            platform: linux-gnu-armv7
            runner: ubuntu-latest
            zigbuild: true
          - target: armv7-unknown-linux-musleabihf
            platform: linux-musl-armv7
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/setup-cross-toolchain-action@12b7ad4acfa95a1476779d6c06699b96ec1691f8 # v1
        if: ${{ !matrix.zigbuild }}
        with:
          target: ${{ matrix.target }}
      # Zig version cargo-zigbuild tests against as stable in its own CI.
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: ${{ matrix.zigbuild }}
        with:
          version: 0.16.0
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: ${{ matrix.zigbuild && 'cargo-about@0.9.1,cargo-zigbuild' || 'cargo-about@0.9.1' }}
      # The `.2.17` suffix pins the glibc floor; the binary still lands in
      # target/<target>/release like a plain cargo build.
      - if: ${{ matrix.zigbuild }}
        run: cargo zigbuild --release -p notema --locked --target ${{ matrix.target }}.2.17
      # CARGO_BUILD_TARGET is set by setup-cross-toolchain-action, so no --target.
      - if: ${{ !matrix.zigbuild }}
        run: cargo build --release -p notema --locked
      - name: Package
        run: |
          install -d dist
          (cd "target/${{ matrix.target }}/release" && zip - notema) > "dist/${{ matrix.platform }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  # AlmaLinux 8 keeps the FUSE executable and libfuse3 at a glibc 2.28 floor.
  linux-fuse:
    name: Linux ${{ matrix.platform }}
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'linux-fuse'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    container: almalinux:8.10
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux-gnu-x86_64-fuse
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            platform: linux-gnu-aarch64-fuse
            runner: ubuntu-24.04-arm
    steps:
      - name: Install build dependencies
        run: dnf install --assumeyes binutils ca-certificates curl fuse3-devel gcc git gzip make pkgconf-pkg-config tar zip
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-about@0.9.1
      - run: cargo build --release -p notema --locked --target ${{ matrix.target }} --features fuse
      - name: Verify libfuse3 linkage and glibc floor
        run: |
          bin="target/${{ matrix.target }}/release/notema"
          readelf -d "$bin" | grep -q 'libfuse3\.so\.3' || { echo "missing libfuse3 DT_NEEDED" >&2; exit 1; }
          bad="$(readelf --dyn-syms -W "$bin" | grep -o 'GLIBC_[0-9.]*' | sort -uV \
              | awk -F_ '{ split($2, v, "."); if (v[1] > 2 || (v[1] == 2 && v[2] > 28)) print }')"
          if [ -n "$bad" ]; then echo "glibc symbols above 2.28: $bad" >&2; exit 1; fi
      - name: Package
        run: |
          install -d dist
          (cd "target/${{ matrix.target }}/release" && zip - notema) > "dist/${{ matrix.platform }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  # The i586 baseline for iSH: an SSE-free build linked against a pinned,
  # checksum-verified static OpenSSL. The bespoke logic already lives in
  # Makefile.toml (build/package-i586-musl); CI just supplies the i686 musl
  # toolchain it links with, under the names the Makefile expects.
  i586:
    name: Linux linux-musl-i586
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'i586'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: i586-unknown-linux-musl
      # Installs an i686 musl cross toolchain (for i586, which links with the
      # i686 musl gcc). The action names it i686-linux-musl-*; the Makefile task
      # calls i686-unknown-linux-musl-*, so bridge the names with symlinks.
      - uses: taiki-e/setup-cross-toolchain-action@12b7ad4acfa95a1476779d6c06699b96ec1691f8 # v1
        with:
          target: i686-unknown-linux-musl
      - name: Bridge toolchain names for the i586 Makefile task
        run: |
          set -euo pipefail
          for tool in gcc ar ranlib; do
            src="$(command -v "i686-linux-musl-$tool" \
                || command -v "i686-unknown-linux-musl-$tool" || true)"
            if [ -z "$src" ]; then
              echo "no i686 musl $tool on PATH; musl tools present:" >&2
              compgen -c | grep -i musl | sort -u >&2 || true
              exit 1
            fi
            sudo ln -sf "$src" "/usr/local/bin/i686-unknown-linux-musl-$tool"
          done
          # The Makefile's [env] also hardcodes the Homebrew cross-toolchain
          # name for the x86_64 *host* linker (used by build scripts); on this
          # runner the host toolchain is plain gcc, so bridge that name too.
          sudo ln -sf "$(command -v gcc)" /usr/local/bin/x86_64-unknown-linux-gnu-gcc
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-make,cargo-about@0.9.1
      # setup-cross-toolchain-action sets CARGO_BUILD_TARGET to i686-musl; the
      # i586 task passes its own --target, so drop it to avoid any conflict.
      - name: Build i586
        run: |
          unset CARGO_BUILD_TARGET
          cargo make build-i586-musl
      - run: cargo make package-i586-musl
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: release/linux-musl-i586.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  # Android/Termux ARM64, cross-compiled with the NDK that ships on the runner
  # (same wiring as ci.yml's android job, extended from check to a real build).
  android:
    name: Android android-aarch64-termux
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'android'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: aarch64-linux-android
      - name: Configure Android NDK compiler
        run: |
          TOOLCHAIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          {
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android24-clang"
            echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android24-clang"
            echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar"
          } >> "$GITHUB_ENV"
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-about@0.9.1
      - run: cargo build --release -p notema --target aarch64-linux-android --locked
      - name: Package
        run: |
          install -d dist
          (cd target/aarch64-linux-android/release && zip - notema) > dist/android-aarch64-termux.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/android-aarch64-termux.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  # Windows, built natively with the MSVC toolchain on each architecture's own
  # hosted runner (windows-11-arm is free for public repos). Each runner's host
  # triple is the matrix target; the explicit --target keeps the output path
  # deterministic. On windows-11-arm, install-action may have no prebuilt
  # cargo-about and falls back to building it from source — slower, but fine.
  windows:
    name: Windows ${{ matrix.platform }}
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'windows'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            platform: windows-msvc-x86_64
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            platform: windows-msvc-aarch64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-about@0.9.1
      - run: cargo build --release -p notema --target ${{ matrix.target }} --locked
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/${{ matrix.target }}/release/notema.exe -DestinationPath dist/${{ matrix.platform }}.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  macos:
    name: macOS ${{ matrix.platform }}
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'macos'
    runs-on: macos-latest
    timeout-minutes: 90
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-apple-darwin
            platform: apple-darwin-x86_64
            task: notarize-macos-intel
          - target: aarch64-apple-darwin
            platform: apple-darwin-aarch64
            task: notarize-macos-silicon
    # Gates signing secrets behind release-environment approval.
    environment: release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}
      - name: Set up signing identity and notarization keychain profile
        # Do not interpolate secrets into the generated shell. Notarization
        # credentials go into the runner's keychain, not .env.
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_USERNAME: ${{ secrets.APPLE_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          umask 077
          {
            printf 'APPLE_DEVELOPER_ID="%s"\n' "$APPLE_DEVELOPER_ID"
            printf 'APPLE_NOTARY_PROFILE="notema-notary"\n'
          } > ./.env
          TEAM_ID="$(printf '%s' "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')"
          xcrun notarytool store-credentials notema-notary \
              --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" >/dev/null
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-make,cargo-about@0.9.1
      - run: cargo make ${{ matrix.task }}
      - name: Remove credentials
        if: always()
        run: rm -f ./.env
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: release/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  macos-fuse:
    name: macOS ${{ matrix.platform }}
    needs: preflight
    if: github.event_name == 'push' || inputs.target_group == 'all' || inputs.target_group == 'macos-fuse'
    runs-on: macos-latest
    timeout-minutes: 90
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-apple-darwin
            platform: apple-darwin-x86_64-fuse
            task: notarize-fuse-macos-intel
          - target: aarch64-apple-darwin
            platform: apple-darwin-aarch64-fuse
            task: notarize-fuse-macos-silicon
    # Gates signing secrets behind release-environment approval.
    environment: release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - run: brew install pkg-config
      - run: brew install --cask fuse-t
      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}
      - name: Set up signing identity and notarization keychain profile
        # Do not interpolate secrets into the generated shell. Notarization
        # credentials go into the runner's keychain, not .env.
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_USERNAME: ${{ secrets.APPLE_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          umask 077
          {
            printf 'APPLE_DEVELOPER_ID="%s"\n' "$APPLE_DEVELOPER_ID"
            printf 'APPLE_NOTARY_PROFILE="notema-notary"\n'
          } > ./.env
          TEAM_ID="$(printf '%s' "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')"
          xcrun notarytool store-credentials notema-notary \
              --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" >/dev/null
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-make,cargo-about@0.9.1
      - run: cargo make ${{ matrix.task }}
      - name: Remove credentials
        if: always()
        run: rm -f ./.env
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: release/${{ matrix.platform }}.zip
          if-no-files-found: error
          archive: false
          retention-days: 1

  # Gather every artifact, checksum them, and publish to the tag's release.
  publish:
    name: Publish release
    needs: [linux, linux-fuse, i586, android, windows, macos, macos-fuse]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write # create the release and upload assets
      id-token: write # mint the OIDC token for provenance attestation
      attestations: write # record the build-provenance attestation
    # Only real tag pushes publish; workflow_dispatch stops after building.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true
          skip-decompress: true
      - name: Validate artifact set
        working-directory: assets
        run: |
          expected="$(printf '%s\n' \
            apple-darwin-aarch64-fuse.zip \
            apple-darwin-aarch64.zip \
            apple-darwin-x86_64-fuse.zip \
            apple-darwin-x86_64.zip \
            android-aarch64-termux.zip \
            linux-gnu-aarch64-fuse.zip \
            linux-gnu-aarch64.zip \
            linux-gnu-armv7.zip \
            linux-gnu-i686.zip \
            linux-gnu-x86_64-fuse.zip \
            linux-gnu-x86_64.zip \
            linux-musl-aarch64.zip \
            linux-musl-armv7.zip \
            linux-musl-i586.zip \
            linux-musl-i686.zip \
            linux-musl-x86_64.zip \
            windows-msvc-aarch64.zip \
            windows-msvc-x86_64.zip | sort)"
          actual="$(find . -maxdepth 1 -type f -name '*.zip' -print | sed 's#^\./##' | sort)"
          if [ "$actual" != "$expected" ]; then
            echo "Release artifact set does not match the expected files" >&2
            diff <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi
      - name: Generate checksums
        working-directory: assets
        run: sha256sum -- *.zip > SHA256SUMS
      # Provenance links each zip to this workflow run; verify with
      # `gh attestation verify <zip> --repo <owner>/<repo>`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            assets/*.zip
            assets/SHA256SUMS
      - name: Publish
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            assets/*.zip
            assets/SHA256SUMS
