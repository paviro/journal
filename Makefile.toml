# Combined packaging tasks
[tasks.package-all]
description = "Package all platform binaries into zip files"
dependencies = [
    "package-termux",
    "package-arm64-musl",
    "package-arm64-gnu",
    "package-x86-gnu",
    "package-x86-musl",
    "package-i686-musl",
