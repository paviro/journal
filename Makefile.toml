# Multi-target build tasks for journal

[config]
default_to_workspace = false
main_project_member = "."

# Default environment variables
[env]
CARGO_BUILD_PROFILE = "release"
ANDROID_API = "24"
ANDROID_SDK_ROOT = "/opt/homebrew/share/android-commandlinetools"
TERMUX_TARGET = "aarch64-linux-android"
CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER = "aarch64-unknown-linux-musl-gcc"
CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER = "aarch64-unknown-linux-gnu-gcc"
CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER = "x86_64-unknown-linux-gnu-gcc"
CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER = "x86_64-unknown-linux-musl-gcc"
CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER = "x86_64-w64-mingw32-gcc"

# Production profile environment
[env.production]
CARGO_BUILD_PROFILE = "release"

# Android / Termux targets
[tasks.build-termux]
description = "Cross-compile for native Termux on 64-bit ARM Android"
dependencies = ["install-termux-target"]
script = '''
TARGET="${TERMUX_TARGET:-aarch64-linux-android}"
API="${ANDROID_API:-24}"

case "$(uname -s)" in
    Darwin)
        HOST_TAG="darwin-x86_64"
        ;;
    Linux)
        HOST_TAG="linux-x86_64"
        ;;
    *)
        echo "Unsupported host OS for Android NDK cross-compilation: $(uname -s)" >&2
        exit 1
        ;;
esac

SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
if [ -z "$SDK_ROOT" ] && [ -d "$HOME/Library/Android/sdk" ]; then
    SDK_ROOT="$HOME/Library/Android/sdk"
fi
if [ -z "$SDK_ROOT" ] && [ -d "/opt/homebrew/share/android-commandlinetools" ]; then
    SDK_ROOT="/opt/homebrew/share/android-commandlinetools"
fi

NDK_HOME="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-${ANDROID_NDK:-}}}"
if [ -z "$NDK_HOME" ] && [ -n "$SDK_ROOT" ] && [ -d "${SDK_ROOT}/ndk" ]; then
    NDK_HOME=$(find "${SDK_ROOT}/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)
fi
if [ -z "$NDK_HOME" ]; then
    echo "ANDROID_NDK_HOME, ANDROID_NDK_ROOT, ANDROID_NDK, or ANDROID_SDK_ROOT with an ndk directory must point to an Android NDK install." >&2
    exit 1
fi

TOOLCHAIN_BIN="${NDK_HOME}/toolchains/llvm/prebuilt/${HOST_TAG}/bin"
LINKER="${TOOLCHAIN_BIN}/aarch64-linux-android${API}-clang"
if [ ! -x "$LINKER" ]; then
    echo "Android NDK linker not found or not executable: $LINKER" >&2
    exit 1
fi

if [ -x "${TOOLCHAIN_BIN}/llvm-ar" ]; then
    export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR="${TOOLCHAIN_BIN}/llvm-ar"
    export AR_aarch64_linux_android="${TOOLCHAIN_BIN}/llvm-ar"
fi
export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$LINKER"
# cc-rs (used by ring and other -sys crates) defaults to a non-existent
# aarch64-linux-android-clang; point it at the API-versioned NDK clang.
export CC_aarch64_linux_android="$LINKER"
export CXX_aarch64_linux_android="${TOOLCHAIN_BIN}/aarch64-linux-android${API}-clang++"
cargo build --release --target "$TARGET"
'''

[tasks.install-termux-target]
description = "Install the Rust target used for Termux ARM64 Android builds"
command = "rustup"
args = ["target", "add", "aarch64-linux-android"]

# ARM64 targets
[tasks.build-arm64-musl]
description = "Build for ARM64 with musl"
command = "cargo"
args = ["build", "--release", "--target", "aarch64-unknown-linux-musl"]

[tasks.build-arm64-gnu]
description = "Build for ARM64 with glibc"
command = "cargo"
args = ["build", "--release", "--target", "aarch64-unknown-linux-gnu"]

# x86_64 Linux targets
[tasks.build-x86-gnu]
description = "Build for x86_64 Linux with glibc"
command = "cargo"
args = ["build", "--release", "--target", "x86_64-unknown-linux-gnu"]

[tasks.build-x86-musl]
description = "Build for x86_64 Linux with musl"
command = "cargo"
args = ["build", "--release", "--target", "x86_64-unknown-linux-musl"]

# Windows targets
[tasks.build-windows-gnu]
description = "Build for Windows x86_64 (MinGW)"
command = "cargo"
args = ["build", "--release", "--target", "x86_64-pc-windows-gnu"]

# macOS targets
# .env carries the Apple credentials journal-storage's build.rs reads to sign and
# notarize the location helper. Missing .env falls back to ad-hoc signing.
[tasks.build-macos-intel]
description = "Build for Intel macOS"
command = "cargo"
args = ["build", "--release", "--target", "x86_64-apple-darwin"]
env_files = ["./.env"]

[tasks.build-macos-silicon]
description = "Build for Apple Silicon macOS"
command = "cargo"
args = ["build", "--release", "--target", "aarch64-apple-darwin"]
env_files = ["./.env"]

[tasks.build-macos-universal]
description = "Build universal macOS binary (Intel + Apple Silicon)"
dependencies = ["build-macos-intel", "build-macos-silicon"]
script = '''
mkdir -p target/universal-apple-darwin/release
lipo -create \
    target/x86_64-apple-darwin/release/journal \
    target/aarch64-apple-darwin/release/journal \
    -output target/universal-apple-darwin/release/journal
'''

# Combined build tasks
[tasks.build-all]
description = "Build for all supported platforms"
dependencies = [
    "build-termux",
    "build-arm64-musl",
    "build-arm64-gnu",
    "build-x86-gnu",
    "build-x86-musl",
    "build-windows-gnu",
    "build-macos-intel",
    "build-macos-silicon",
    "build-macos-universal"
]

[tasks.build-arm64-all]
description = "Build for both ARM64 targets"
dependencies = [
    "build-termux",
    "build-arm64-musl",
    "build-arm64-gnu"
]

[tasks.build-linux-all]
description = "Build for all Linux targets"
dependencies = [
    "build-arm64-musl",
    "build-arm64-gnu",
    "build-x86-gnu",
    "build-x86-musl"
]

[tasks.build-windows-all]
description = "Build for all Windows targets"
dependencies = [
    "build-windows-gnu"
]

[tasks.build-macos-all]
description = "Build for all macOS targets"
dependencies = [
    "build-macos-intel",
    "build-macos-silicon",
    "build-macos-universal"
]

[tasks.run-tests]
description = "Execute the full test suite before building releases"
command = "cargo"
args = ["test"]

[tasks.clean-all]
description = "Clean all build artifacts"
command = "cargo"
args = ["clean"]

# Packaging tasks
[tasks.create-release-dir]
description = "Create release directory"
script = '''
mkdir -p release
'''

[tasks.package-termux]
description = "Package native Termux ARM64 Android binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="journal"
TARGET="${TERMUX_TARGET:-aarch64-linux-android}"
PLATFORM="android-aarch64-termux"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-arm64-musl]
description = "Package ARM64 musl binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="journal"
TARGET="aarch64-unknown-linux-musl"
PLATFORM="linux-musl-aarch64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-arm64-gnu]
description = "Package ARM64 gnu binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="journal"
TARGET="aarch64-unknown-linux-gnu"
PLATFORM="linux-gnu-aarch64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-x86-gnu]
description = "Package x86_64 gnu binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="journal"
TARGET="x86_64-unknown-linux-gnu"
PLATFORM="linux-gnu-x86_64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-x86-musl]
description = "Package x86_64 musl binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="journal"
TARGET="x86_64-unknown-linux-musl"
PLATFORM="linux-musl-x86_64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-windows-gnu]
description = "Package Windows gnu binary"
dependencies = ["create-release-dir"]
script = '''
BINARY_NAME="journal.exe"
TARGET="x86_64-pc-windows-gnu"
PLATFORM="windows-gnu-x86_64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-macos-intel]
description = "Package Intel macOS binary"
dependencies = ["create-release-dir", "sign-macos-intel"]
script = '''
BINARY_NAME="journal"
TARGET="x86_64-apple-darwin"
PLATFORM="apple-darwin-x86_64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-macos-silicon]
description = "Package Apple Silicon macOS binary"
dependencies = ["create-release-dir", "sign-macos-silicon"]
script = '''
BINARY_NAME="journal"
TARGET="aarch64-apple-darwin"
PLATFORM="apple-darwin-aarch64"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-macos-universal]
description = "Package Universal macOS binary"
dependencies = ["create-release-dir", "sign-macos-universal"]
script = '''
BINARY_NAME="journal"
TARGET="universal-apple-darwin"
PLATFORM="apple-darwin-universal"
cp "target/${TARGET}/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

# Combined packaging tasks
[tasks.package-all]
description = "Package all platform binaries into zip files"
dependencies = [
    "package-termux",
    "package-arm64-musl",
    "package-arm64-gnu",
    "package-x86-gnu",
    "package-x86-musl",
    "package-windows-gnu",
    "package-macos-intel",
    "package-macos-silicon",
    "package-macos-universal"
]

# The release command: every artifact buildable on a Mac — all standard platform
# binaries plus the signed+notarized macOS FUSE builds. (Linux FUSE binaries are
# built separately on Linux: release-fuse-linux.)
[tasks.release]
description = "Build, sign, package and notarize every release artifact buildable on a Mac"
dependencies = [
    "check-apple-credentials",
    "run-tests",
    "build-all",
    "package-all",
    "notarize-macos-intel",
    "notarize-macos-silicon",
    "notarize-macos-universal",
    "notarize-fuse-macos-intel",
    "notarize-fuse-macos-silicon",
    "notarize-fuse-macos-universal"
]

# A release is signed and notarized, so refuse to start one without the Apple
# credentials. Local, unsigned builds use `cargo build --release` instead.
[tasks.check-apple-credentials]
description = "Fail early unless the Apple signing/notarization credentials are set"
script = '''
if [ -f ./.env ]; then
    set -a
    # shellcheck disable=SC1091
    . ./.env
    set +a
fi
missing=""
[ -n "$APPLE_DEVELOPER_ID" ] || missing="$missing APPLE_DEVELOPER_ID"
[ -n "$APPLE_USERNAME" ] || missing="$missing APPLE_USERNAME"
[ -n "$APPLE_PASSWORD" ] || missing="$missing APPLE_PASSWORD"
if [ -n "$missing" ]; then
    echo "release needs Apple credentials for signing + notarization; missing:$missing" >&2
    echo "Set them in ./.env, or use \`cargo build --release\` for an unsigned local build." >&2
    exit 1
fi
echo "Apple credentials present."
'''

[tasks.sign-macos-intel]
description = "Sign Intel macOS binary if APPLE_DEVELOPER_ID is set"
dependencies = ["build-macos-intel"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
BINARY_PATH="target/x86_64-apple-darwin/release/journal"
if [ -z "$APPLE_DEVELOPER_ID" ]; then
    echo "APPLE_DEVELOPER_ID not set, cannot sign Intel macOS binary." >&2
    exit 1
fi
codesign --sign "$APPLE_DEVELOPER_ID" --timestamp --options runtime "$BINARY_PATH"
'''

[tasks.sign-macos-silicon]
description = "Sign Apple Silicon macOS binary if APPLE_DEVELOPER_ID is set"
dependencies = ["build-macos-silicon"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
BINARY_PATH="target/aarch64-apple-darwin/release/journal"
if [ -z "$APPLE_DEVELOPER_ID" ]; then
    echo "APPLE_DEVELOPER_ID not set, cannot sign Apple Silicon macOS binary." >&2
    exit 1
fi
codesign --sign "$APPLE_DEVELOPER_ID" --timestamp --options runtime "$BINARY_PATH"
'''

[tasks.sign-macos-universal]
description = "Sign Universal macOS binary if APPLE_DEVELOPER_ID is set"
dependencies = ["build-macos-universal"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
BINARY_PATH="target/universal-apple-darwin/release/journal"
if [ -z "$APPLE_DEVELOPER_ID" ]; then
    echo "APPLE_DEVELOPER_ID not set, cannot sign Universal macOS binary." >&2
    exit 1
fi
codesign --sign "$APPLE_DEVELOPER_ID" --timestamp --options runtime "$BINARY_PATH"
'''

[tasks.notarize-macos-intel]
description = "Notarize Intel macOS zip if APPLE_USERNAME and APPLE_PASSWORD are set"
dependencies = ["package-macos-intel"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
ZIP_PATH="release/apple-darwin-x86_64.zip"
TEAM_ID=$(echo "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')
if [ -z "$APPLE_USERNAME" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$TEAM_ID" ]; then
    echo "APPLE_USERNAME, APPLE_PASSWORD, or APPLE_DEVELOPER_ID team id not set, cannot notarize Intel macOS zip." >&2
    exit 1
fi
xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
'''

[tasks.notarize-macos-silicon]
description = "Notarize Apple Silicon macOS zip if APPLE_USERNAME and APPLE_PASSWORD are set"
dependencies = ["package-macos-silicon"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
ZIP_PATH="release/apple-darwin-aarch64.zip"
TEAM_ID=$(echo "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')
if [ -z "$APPLE_USERNAME" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$TEAM_ID" ]; then
    echo "APPLE_USERNAME, APPLE_PASSWORD, or APPLE_DEVELOPER_ID team id not set, cannot notarize Apple Silicon macOS zip." >&2
    exit 1
fi
xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
'''

[tasks.notarize-macos-universal]
description = "Notarize Universal macOS zip if APPLE_USERNAME and APPLE_PASSWORD are set"
dependencies = ["package-macos-universal"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
ZIP_PATH="release/apple-darwin-universal.zip"
TEAM_ID=$(echo "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')
if [ -z "$APPLE_USERNAME" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$TEAM_ID" ]; then
    echo "APPLE_USERNAME, APPLE_PASSWORD, or APPLE_DEVELOPER_ID team id not set, cannot notarize Universal macOS zip." >&2
    exit 1
fi
xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
'''

# ------------------------------------------------------------------------------
# macOS FUSE builds
#
# The same `journal` binary built with `--features fuse` (mounts an encrypted
# journal as a decrypted filesystem). Links libfuse3, so it needs macFUSE or
# fuse-t installed to build and run. Zips are `<platform>-fuse.zip`; builds go to
# `target/fuse/` so they don't clobber the standard artifacts.
# ------------------------------------------------------------------------------

[tasks.build-fuse-macos-intel]
description = "Build Intel macOS with FUSE"
command = "cargo"
args = ["build", "--release", "--features", "fuse", "--target", "x86_64-apple-darwin"]
env = { CARGO_TARGET_DIR = "target/fuse" }
env_files = ["./.env"]

[tasks.build-fuse-macos-silicon]
description = "Build Apple Silicon macOS with FUSE"
command = "cargo"
args = ["build", "--release", "--features", "fuse", "--target", "aarch64-apple-darwin"]
env = { CARGO_TARGET_DIR = "target/fuse" }
env_files = ["./.env"]

[tasks.build-fuse-macos-universal]
description = "Build universal macOS FUSE binary (Intel + Apple Silicon)"
dependencies = ["build-fuse-macos-intel", "build-fuse-macos-silicon"]
script = '''
mkdir -p target/fuse/universal-apple-darwin/release
lipo -create \
    target/fuse/x86_64-apple-darwin/release/journal \
    target/fuse/aarch64-apple-darwin/release/journal \
    -output target/fuse/universal-apple-darwin/release/journal
'''

# macOS only: releases are built on a Mac, and the FUSE feature links libfuse3
# (C), which doesn't cross-compile to Linux without a sysroot. Build the Linux
# FUSE binary natively on Linux (see README).

# Signing (macOS FUSE binaries)
[tasks.sign-fuse-macos-intel]
description = "Sign Intel macOS FUSE binary if APPLE_DEVELOPER_ID is set"
dependencies = ["build-fuse-macos-intel"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
BINARY_PATH="target/fuse/x86_64-apple-darwin/release/journal"
if [ -z "$APPLE_DEVELOPER_ID" ]; then
    echo "APPLE_DEVELOPER_ID not set, cannot sign Intel macOS FUSE binary." >&2
    exit 1
fi
codesign --sign "$APPLE_DEVELOPER_ID" --timestamp --options runtime "$BINARY_PATH"
'''

[tasks.sign-fuse-macos-silicon]
description = "Sign Apple Silicon macOS FUSE binary if APPLE_DEVELOPER_ID is set"
dependencies = ["build-fuse-macos-silicon"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
BINARY_PATH="target/fuse/aarch64-apple-darwin/release/journal"
if [ -z "$APPLE_DEVELOPER_ID" ]; then
    echo "APPLE_DEVELOPER_ID not set, cannot sign Apple Silicon macOS FUSE binary." >&2
    exit 1
fi
codesign --sign "$APPLE_DEVELOPER_ID" --timestamp --options runtime "$BINARY_PATH"
'''

[tasks.sign-fuse-macos-universal]
description = "Sign Universal macOS FUSE binary if APPLE_DEVELOPER_ID is set"
dependencies = ["build-fuse-macos-universal"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
BINARY_PATH="target/fuse/universal-apple-darwin/release/journal"
if [ -z "$APPLE_DEVELOPER_ID" ]; then
    echo "APPLE_DEVELOPER_ID not set, cannot sign Universal macOS FUSE binary." >&2
    exit 1
fi
codesign --sign "$APPLE_DEVELOPER_ID" --timestamp --options runtime "$BINARY_PATH"
'''

# Packaging (FUSE): same `journal` binary, `<platform>-fuse.zip` name.
[tasks.package-fuse-macos-intel]
description = "Package Intel macOS FUSE binary"
dependencies = ["create-release-dir", "sign-fuse-macos-intel"]
script = '''
BINARY_NAME="journal"
PLATFORM="apple-darwin-x86_64-fuse"
cp "target/fuse/x86_64-apple-darwin/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-fuse-macos-silicon]
description = "Package Apple Silicon macOS FUSE binary"
dependencies = ["create-release-dir", "sign-fuse-macos-silicon"]
script = '''
BINARY_NAME="journal"
PLATFORM="apple-darwin-aarch64-fuse"
cp "target/fuse/aarch64-apple-darwin/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-fuse-macos-universal]
description = "Package Universal macOS FUSE binary"
dependencies = ["create-release-dir", "sign-fuse-macos-universal"]
script = '''
BINARY_NAME="journal"
PLATFORM="apple-darwin-universal-fuse"
cp "target/fuse/universal-apple-darwin/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

# Notarization (macOS FUSE zips)
[tasks.notarize-fuse-macos-intel]
description = "Notarize Intel macOS FUSE zip"
dependencies = ["package-fuse-macos-intel"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
ZIP_PATH="release/apple-darwin-x86_64-fuse.zip"
TEAM_ID=$(echo "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')
if [ -z "$APPLE_USERNAME" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$TEAM_ID" ]; then
    echo "APPLE_USERNAME, APPLE_PASSWORD, or APPLE_DEVELOPER_ID team id not set, cannot notarize Intel macOS FUSE zip." >&2
    exit 1
fi
xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
'''

[tasks.notarize-fuse-macos-silicon]
description = "Notarize Apple Silicon macOS FUSE zip"
dependencies = ["package-fuse-macos-silicon"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
ZIP_PATH="release/apple-darwin-aarch64-fuse.zip"
TEAM_ID=$(echo "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')
if [ -z "$APPLE_USERNAME" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$TEAM_ID" ]; then
    echo "APPLE_USERNAME, APPLE_PASSWORD, or APPLE_DEVELOPER_ID team id not set, cannot notarize Apple Silicon macOS FUSE zip." >&2
    exit 1
fi
xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
'''

[tasks.notarize-fuse-macos-universal]
description = "Notarize Universal macOS FUSE zip"
dependencies = ["package-fuse-macos-universal"]
env_files = ["./.env"]
condition = { files_exist = ["./.env"] }
script = '''
ZIP_PATH="release/apple-darwin-universal-fuse.zip"
TEAM_ID=$(echo "$APPLE_DEVELOPER_ID" | sed -n 's/.*(\(.*\)).*/\1/p')
if [ -z "$APPLE_USERNAME" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$TEAM_ID" ]; then
    echo "APPLE_USERNAME, APPLE_PASSWORD, or APPLE_DEVELOPER_ID team id not set, cannot notarize Universal macOS FUSE zip." >&2
    exit 1
fi
xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_USERNAME" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
'''

# Combined FUSE build/package/release
[tasks.build-fuse-macos-all]
description = "Build all macOS FUSE targets"
dependencies = [
    "build-fuse-macos-intel",
    "build-fuse-macos-silicon",
    "build-fuse-macos-universal"
]

[tasks.package-fuse-macos-all]
description = "Package all macOS FUSE binaries"
dependencies = [
    "package-fuse-macos-intel",
    "package-fuse-macos-silicon",
    "package-fuse-macos-universal"
]

# Build and package the macOS FUSE release: signed + notarized `-fuse` zips.
[tasks.release-fuse-macos]
description = "Build, sign, package and notarize the macOS FUSE artifacts"
dependencies = [
    "check-apple-credentials",
    "run-tests",
    "build-fuse-macos-all",
    "package-fuse-macos-all",
    "notarize-fuse-macos-intel",
    "notarize-fuse-macos-silicon",
    "notarize-fuse-macos-universal"
]

# ------------------------------------------------------------------------------
# Linux FUSE builds — run natively on Linux (needs libfuse3-dev). Not part of the
# macOS release command: the libfuse3 (C) link doesn't cross-compile from a Mac.
# ------------------------------------------------------------------------------

[tasks.build-fuse-arm64-musl]
description = "Build ARM64 musl Linux with FUSE"
command = "cargo"
args = ["build", "--release", "--features", "fuse", "--target", "aarch64-unknown-linux-musl"]
env = { CARGO_TARGET_DIR = "target/fuse" }

[tasks.build-fuse-arm64-gnu]
description = "Build ARM64 glibc Linux with FUSE"
command = "cargo"
args = ["build", "--release", "--features", "fuse", "--target", "aarch64-unknown-linux-gnu"]
env = { CARGO_TARGET_DIR = "target/fuse" }

[tasks.build-fuse-x86-gnu]
description = "Build x86_64 glibc Linux with FUSE"
command = "cargo"
args = ["build", "--release", "--features", "fuse", "--target", "x86_64-unknown-linux-gnu"]
env = { CARGO_TARGET_DIR = "target/fuse" }

[tasks.build-fuse-x86-musl]
description = "Build x86_64 musl Linux with FUSE"
command = "cargo"
args = ["build", "--release", "--features", "fuse", "--target", "x86_64-unknown-linux-musl"]
env = { CARGO_TARGET_DIR = "target/fuse" }

[tasks.package-fuse-arm64-musl]
description = "Package ARM64 musl Linux FUSE binary"
dependencies = ["create-release-dir", "build-fuse-arm64-musl"]
script = '''
BINARY_NAME="journal"
PLATFORM="linux-musl-aarch64-fuse"
cp "target/fuse/aarch64-unknown-linux-musl/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-fuse-arm64-gnu]
description = "Package ARM64 glibc Linux FUSE binary"
dependencies = ["create-release-dir", "build-fuse-arm64-gnu"]
script = '''
BINARY_NAME="journal"
PLATFORM="linux-gnu-aarch64-fuse"
cp "target/fuse/aarch64-unknown-linux-gnu/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-fuse-x86-gnu]
description = "Package x86_64 glibc Linux FUSE binary"
dependencies = ["create-release-dir", "build-fuse-x86-gnu"]
script = '''
BINARY_NAME="journal"
PLATFORM="linux-gnu-x86_64-fuse"
cp "target/fuse/x86_64-unknown-linux-gnu/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

[tasks.package-fuse-x86-musl]
description = "Package x86_64 musl Linux FUSE binary"
dependencies = ["create-release-dir", "build-fuse-x86-musl"]
script = '''
BINARY_NAME="journal"
PLATFORM="linux-musl-x86_64-fuse"
cp "target/fuse/x86_64-unknown-linux-musl/release/${BINARY_NAME}" "release/"
cd release
zip "${PLATFORM}.zip" "${BINARY_NAME}"
rm "${BINARY_NAME}"
'''

# One command for Linux hosts: build + package every Linux FUSE artifact.
[tasks.release-fuse-linux]
description = "Build and package all Linux FUSE artifacts (Linux host, libfuse3-dev)"
dependencies = [
    "run-tests",
    "build-fuse-arm64-musl",
    "build-fuse-arm64-gnu",
    "build-fuse-x86-gnu",
    "build-fuse-x86-musl",
    "package-fuse-arm64-musl",
    "package-fuse-arm64-gnu",
    "package-fuse-x86-gnu",
    "package-fuse-x86-musl"
]
