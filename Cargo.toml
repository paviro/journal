[package]
name = "journal"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[workspace]
members = ["crates/journal-core", "crates/journal-encryption", "crates/journal-storage", "crates/journal-import", "crates/journal-analytics", "crates/journal-seed", "crates/journal-locate"]

# One version for the whole workspace: the macOS location helper stamps this into
# its bundle and the runtime checks it, so the crates must not drift apart.
[workspace.package]
version = "2026.7.1"
edition = "2024"
license = "EUPL-1.2"
authors = ["Paul-Vincent Roll <journal@paviro.de>"]

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
dirs = "6"
# Decompress and parse the embedded third-party license report (see build.rs).
flate2 = "1"
image = { version = "0.25", default-features = false }
indicatif = "0.17"
# rascii_art still targets image 0.24; a second, decode-feature-free copy lets us
# hand it images we already decoded on the 0.25 side (see `tui::image::to_rascii_image`).
image_024 = { package = "image", version = "0.24", default-features = false }
journal-analytics = { path = "crates/journal-analytics" }
journal-core = { path = "crates/journal-core" }
journal-import = { path = "crates/journal-import" }
journal-seed = { path = "crates/journal-seed" }
journal-storage = { path = "crates/journal-storage" }
mimalloc = "0.1"
notify = "7.0"
ratatui = "0.30"
ratatui_029 = { package = "ratatui", version = "0.29" }
ratatui-image = { version = "11", default-features = false, features = ["crossterm", "image-defaults"] }
ratatui-markdown = { version = "0.3.6", default-features = false, features = ["markdown", "mermaid"] }
rascii_art = "0.4.5"
rayon = "1"
rpassword = "7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shell-words = "1"
toml = "1.1"
unicode-width = "0.2"
zeroize = "1.9.0"

[build-dependencies]
# build.rs shells out to cargo-about and embeds a gzipped JSON license report.
flate2 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
