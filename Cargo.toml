[package]
name = "journal"
version = "2026.7.1"
edition = "2024"

[workspace]
members = ["crates/journal-core", "crates/journal-storage"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
dirs = "6"
journal-core = { path = "crates/journal-core" }
journal-storage = { path = "crates/journal-storage" }
notify = "7.0"
ratatui = "0.30"
ratatui_029 = { package = "ratatui", version = "0.29" }
ratatui-markdown = { version = "0.3.6", default-features = false, features = ["markdown", "mermaid"] }
rpassword = "7"
serde = { version = "1", features = ["derive"] }
shell-words = "1"
toml = "1.1"
unicode-width = "0.2"

[dev-dependencies]
tempfile = "3"
